<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">

  <!-- Soft circle background -->
  <circle cx="36" cy="36" r="36" fill="#FDF2F8"/>

  <!-- Glow -->
  <path d="M 52 14 C 70 14 70 36 36 36 C 2 36 2 58 20 58"
        stroke="#E91E8C" stroke-width="12" stroke-linecap="round" opacity="0.1"/>

  <!-- S-curve flow path -->
  <path d="M 52 14 C 70 14 70 36 36 36 C 2 36 2 58 20 58"
        stroke="url(#iconGradient)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Top node -->
  <circle cx="52" cy="14" r="7" fill="#E91E8C"/>
  <circle cx="52" cy="14" r="3.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Middle node -->
  <circle cx="36" cy="36" r="5" fill="#C2185B"/>
  <circle cx="36" cy="36" r="2.2" fill="#FFFFFF" opacity="0.8"/>

  <!-- Bottom node -->
  <circle cx="20" cy="58" r="7" fill="#E91E8C"/>
  <polygon points="17,55 23,58 17,61" fill="#FFFFFF" opacity="0.9"/>

  <defs>
    <linearGradient id="iconGradient" x1="52" y1="14" x2="20" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="50%" stop-color="#E91E8C"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </linearGradient>
  </defs>

</svg>
