  <!-- SM letters in pink -->
  <text x="30" y="41" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900" fill="#E91E8C" text-anchor="middle">SM</text>
  <!-- Wordmark: Agent in white -->
  <text x="76" y="32" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="start">Agent</text>
