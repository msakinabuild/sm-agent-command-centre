<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">

  <!-- ── ICON MARK: S-curve on dark background ── -->

  <!-- Glow -->
  <path d="M 52 12 C 74 12 74 36 36 36 C -2 36 -2 60 20 60"
        stroke="#E91E8C" stroke-width="14" stroke-linecap="round" opacity="0.15"/>

  <!-- S-curve -->
  <path d="M 52 12 C 74 12 74 36 36 36 C -2 36 -2 60 20 60"
        stroke="url(#darkGradient)" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Top node -->
  <circle cx="52" cy="12" r="8" fill="#E91E8C"/>
  <circle cx="52" cy="12" r="4" fill="#FFFFFF" opacity="0.9"/>

  <!-- Middle node -->
  <circle cx="36" cy="36" r="5.5" fill="#F472B6"/>
  <circle cx="36" cy="36" r="2.5" fill="#FFFFFF" opacity="0.7"/>

  <!-- Bottom node -->
  <circle cx="20" cy="60" r="8" fill="#E91E8C"/>
  <polygon points="17,57 23,60 17,63" fill="#FFFFFF" opacity="0.9"/>

  <defs>
    <linearGradient id="darkGradient" x1="52" y1="12" x2="20" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="50%" stop-color="#E91E8C"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>

  <!-- Separator -->
  <line x1="82" y1="10" x2="82" y2="62" stroke="#374151" stroke-width="1.2"/>

  <!-- "Agent" white -->
  <text x="96" y="40"
        font-family="Arial, Helvetica, sans-serif"
        font-size="30" font-weight="800"
        fill="#FFFFFF"
        letter-spacing="-0.8">Agent</text>

  <!-- "SM" in pink -->
  <text x="97" y="22"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" font-weight="700"
        fill="#E91E8C"
        letter-spacing="2">SM</text>

  <!-- Tagline grey -->
  <text x="97" y="57"
        font-family="Arial, Helvetica, sans-serif"
        font-size="8.5" font-weight="400"
        fill="#6B7280"
        letter-spacing="2.5">AI AUTOMATION</text>

</svg>
